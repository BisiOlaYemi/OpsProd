services:
  api:
    build:
      context: ../instance/fastapi
      dockerfile: Dockerfile
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    pids_limit: 100
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - backend

  nginx:
    build:
      context: ../instance/nginx-unprivileged
      dockerfile: Dockerfile
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:noexec,nosuid,size=32m
      - /var/cache/nginx:noexec,nosuid,size=32m
      - /var/run:noexec,nosuid,size=8m
    pids_limit: 100
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      api:
        condition: service_started
    networks:
      - backend

networks:
  backend:
    driver: bridge
    internal: true
